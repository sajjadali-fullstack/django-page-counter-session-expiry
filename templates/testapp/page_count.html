<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Page</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- External CSS -->
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <style>
        /* UNIVERSAL SELECTOR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        /* Body */
        body {
            background-color: black;
            color: white;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* H1 */
        h1 {
            text-align: center;
            /* clamp(minimum, preferred, maximum) */
            font-size: clamp(2rem, 5vw, 4rem);
            /* 2rem → minimum size, 5vw → screen ke according flexible size, 4rem → maximum size */
            text-decoration: underline;
            padding: 20px;

        }

        /* Span */
        .count {
            font-size: clamp(3rem, 8vw, 6rem);
            color: cornflowerblue;
            font-family: monospace;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
        }

        .social-icons {
            margin-top: 10px;
        }

        .social-icons a {
            color: white;
            margin: 0 12px;
            font-size: 28px;
            transition: 0.3s ease;
            display: inline-block;
        }

        #linkedin:hover {
            color: cornflowerblue;
            transform: scale(1.2);
        }

        #git:hover{
            color: greenyellow;
            transform: scale(1.2);
        }

        #author > a{
            color: white;
            text-decoration: none;
            transition: 0.2s ease;
        }

        #author > a:hover{
            font-weight: 600;
            color: rgb(110, 232, 11);
        }
    </style>
</head>

<body>
    <h1>Page Count: <span class="count">{{ count }}</span></h1>

    <!-- Footer -->
    <footer>
        <span id="author"><a href="https://sajjadali-fullstack.github.io/sajjad-ali-portfolio/" target="_blank">Made by Sajjad Ali</a></span>

        <div class="social-icons">
            <!-- Github -->
            <a href="https://github.com/sajjadali-fullstack" target="_blank">
                <i class="fa-brands fa-github" id="git"></i>
            </a>

            <!-- Linkedin -->
            <a href="https://www.linkedin.com/in/sajjadali-fullstack/" target="_blank">
                <i class="fa-brands fa-linkedin" id="linkedin"></i>
            </a>
        </div>
    </footer>
</body>

</html>
